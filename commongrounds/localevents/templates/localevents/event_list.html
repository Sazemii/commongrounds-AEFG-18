{% extends 'base.html' %} 
{% load static %}
{% block title %}Local Events List{% endblock %} 
{% block page_heading %}Local Events List{% endblock %}

{% block content %}
    <ul>
        {% for event in events %}
            <li>
                <a href="{{ event.get_absolute_url }}">{{ event.title }}</a>
            </li>
        {% endfor %}
    </ul>
{% endblock %}
