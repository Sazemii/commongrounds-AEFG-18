{% extends 'base.html' %}

{% block title %}DIY Projects - Projects{% endblock %}

{% block content %}
<h1>Projects</h1>
<ul>
    {% for project in object_list %}
    <li>
        <a href="{{ project.get_absolute_url }}">
            <h3>{{ project.title }}</h3>
        </a>
    </li>
    {% empty %}
    <li>No projects available.</li>
    {% endfor %}
</ul>
{% endblock %}
