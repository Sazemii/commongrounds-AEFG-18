{% extends 'base.html' %}

{% block title %}Book Club - Books{% endblock %}

{% block content %}
<h1>Books</h1>
<ul>
    {% for book in object_list %}
    <li>
        <a href="{{ book.get_absolute_url }}">
            {{ book.title }}
        </a>
        - {{ book.author }} ({{ book.publication_year }})
    </li>
    {% empty %}
    <li>No books available.</li>
    {% endfor %}
</ul>
{% endblock %}
