{% extends 'base.html' %}

{% block content %}
<h1>Commission Requests</h1>

{% if commissions %}
    <div class="commission-list">
        <ul>
        {% for commission in commissions %}
            <li>
                <a href="{% url 'commissions:commission_detail' commission.pk %}">
                    {{ commission.title }}
                </a>
            </li>
        {% endfor %}
        </ul>
    </div>
{% else %}
    <p>No commission requests available.</p>
{% endif %}
{% endblock %}
