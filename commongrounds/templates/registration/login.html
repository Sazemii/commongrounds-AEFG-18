{% extends 'base.html' %}

{% block title %}Login | Common Grounds{% endblock %}
{% block page_heading %}Login{% endblock %}

{% block content %}
<form method="POST">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">Login</button>
</form>
<p><a href="{% url 'password_reset' %}">Forgot password?</a></p>
<p>No account yet? <a href="{% url 'accounts:register' %}">Register</a></p>
{% endblock %}
